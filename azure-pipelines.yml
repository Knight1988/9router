trigger:
  branches:
    include:
      - latest
      - beta

pool:
  name: Ubuntu

variables:
  IMAGE_NAME: knight1988/9router
  DOCKER_TAG: $(Build.SourceBranchName)

stages:
  - stage: Test
    displayName: Build and Test
    jobs:
      - job: UnitTests
        displayName: Run Unit Tests
        pool:
          name: Ubuntu
        steps:
          - checkout: self
            displayName: Checkout source

          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              export PATH="$(dirname "$(nvm which current 2>/dev/null || command -v node)"):$PATH"
              echo "Using node: $(which node) ($(node -v))"
              echo "Using npm:  $(which npm) ($(npm -v))"
              npm install
              cd tests
              npm install
              npm test
            displayName: Run Vitest unit tests

      - job: Test
        displayName: Build Docker and Run Tests
        dependsOn: UnitTests
        pool:
          name: Ubuntu
        steps:
          - checkout: self
            displayName: Checkout source

          - script: |
              docker compose down
              docker compose up --build -d

              echo "Waiting for server to be ready..."
              for i in $(seq 1 30); do
                if curl -sk https://localhost:20129/v1/models > /dev/null 2>&1; then
                  echo "Server ready."
                  break
                fi
                sleep 2
              done

              PASS=0
              FAIL=0

              run_test() {
                local label="$1"
                local response="$2"

                echo "=== $label ==="
                echo "$response"

                # Try SSE streaming format first (content_block_delta events)
                content=$(echo "$response" | grep "content_block_delta" | grep -oE '"text"[[:space:]]*:[[:space:]]*"[^"]*"' | sed -E 's/"text"[[:space:]]*:[[:space:]]*"//g' | sed 's/"//g' | tr -d '\n')
                # Fall back to non-streaming JSON response format
                if [ -z "$content" ]; then
                  content=$(echo "$response" | grep -oE '"text"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 | sed -E 's/"text"[[:space:]]*:[[:space:]]*"//g' | sed 's/"//g')
                fi

                if [ -n "$content" ]; then
                  echo "PASS: $content"
                  PASS=$((PASS+1))
                else
                  echo "FAIL: no content found"
                  FAIL=$((FAIL+1))
                fi
                echo
              }

              FIRST=1
              for model in planning coding; do
                if [ "$FIRST" = "0" ]; then
                  echo "Waiting 5s for model locks to expire..."
                  sleep 5
                fi
                FIRST=0

                run_test "$model" "$(curl -sk https://localhost:20129/v1/messages \
                  -H "Content-Type: application/json" \
                  -H "x-api-key: $(TEST_API_KEY)" \
                  -H "anthropic-version: 2023-06-01" \
                  -d "{\"model\":\"$model\",\"messages\":[{\"role\":\"user\",\"content\":\"say hi\"}],\"max_tokens\":50}" 2>&1)"
              done

              echo "Results: $PASS passed, $FAIL failed"

              docker compose down

              if [ "$FAIL" -gt 0 ]; then
                exit 1
              fi
            displayName: Run tests

  - stage: Build
    displayName: Build and Push Docker Image
    dependsOn: Test
    condition: and(succeeded(), or(eq(variables['Build.SourceBranchName'], 'latest'), eq(variables['Build.SourceBranchName'], 'beta')))
    jobs:
      - job: Build
        displayName: Build and Push
        pool:
          name: Ubuntu
        steps:
          - checkout: self
            displayName: Checkout source

          - script: |
              echo "Building Docker image $(IMAGE_NAME):$(DOCKER_TAG)..."
              docker build -t "$(IMAGE_NAME):$(DOCKER_TAG)" .
            displayName: Build Docker image

          - script: |
              echo "Pushing Docker image $(IMAGE_NAME):$(DOCKER_TAG)..."
              docker push "$(IMAGE_NAME):$(DOCKER_TAG)"
            displayName: Push Docker image

  - stage: Deploy
    displayName: Redeploy Dockge
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'beta'))
    jobs:
      - job: Deploy
        displayName: Redeploy via Dockge
        pool:
          name: Ubuntu
        steps:
          - script: |
              set -euo pipefail
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              export PATH="$(dirname "$(nvm which current 2>/dev/null || command -v node)"):$PATH"
              echo "Using node: $(which node) ($(node -v))"

              TMPDIR=$(mktemp -d)
              cd "$TMPDIR"
              npm install --silent socket.io-client

              node - <<'EOF'
              const { io } = require("socket.io-client");

              const DOCKGE_URL = process.env.DOCKGE_URL;
              const USERNAME   = process.env.DOCKGE_USERNAME;
              const PASSWORD   = process.env.DOCKGE_PASSWORD;
              const STACK_NAME = process.env.STACK_NAME;
              const TIMEOUT_MS = 180000;

              let exited = false;
              function exit(code, msg) {
                if (exited) return;
                exited = true;
                console.log(msg);
                socket.disconnect();
                process.exit(code);
              }

              const timer = setTimeout(() => exit(1, "Timed out waiting for Dockge response."), TIMEOUT_MS);

              const socket = io(DOCKGE_URL, {
                path: "/dockge/socket.io",
                transports: ["websocket"],
                rejectUnauthorized: false,
              });

              socket.on("connect_error", (err) => exit(1, `Connection error: ${err.message}`));
              socket.on("connect", () => {
                console.log("Connected. Logging in...");
                socket.emit("login", { username: USERNAME, password: PASSWORD }, (res) => {
                  if (!res || !res.ok) return exit(1, `Login failed: ${JSON.stringify(res)}`);
                  console.log("Logged in. Triggering updateStack for " + STACK_NAME + "...");
                  socket.emit("updateStack", STACK_NAME, (res) => {
                    clearTimeout(timer);
                    if (res && res.ok) exit(0, "Dockge redeploy successful.");
                    else exit(1, `updateStack failed: ${JSON.stringify(res)}`);
                  });
                });
              });
              EOF
            displayName: Redeploy 9router stack via Dockge
            env:
              DOCKGE_URL: https://dk-server.linkpc.net
              STACK_NAME: 9router
              DOCKGE_USERNAME: $(DOCKGE_USERNAME)
              DOCKGE_PASSWORD: $(DOCKGE_PASSWORD)
