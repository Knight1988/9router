trigger:
  branches:
    include:
      - master
      - beta

pool:
  name: Ubuntu

variables:
  IMAGE_NAME: knight1988/9router
  # Map branch to Docker tag: master -> latest, beta -> beta
  ${{ if eq(variables['Build.SourceBranchName'], 'master') }}:
    DOCKER_TAG: latest
  ${{ elseif eq(variables['Build.SourceBranchName'], 'beta') }}:
    DOCKER_TAG: beta
  ${{ else }}:
    DOCKER_TAG: $(Build.SourceBranchName)

steps:
  - checkout: self
    displayName: Checkout source

  - script: |
      chmod +x publish.sh
      echo "Building Docker image $(IMAGE_NAME):$(DOCKER_TAG)..."
      docker build -t "$(IMAGE_NAME):$(DOCKER_TAG)" .
    displayName: Build Docker image

  - script: |
      echo "Pushing Docker image $(IMAGE_NAME):$(DOCKER_TAG)..."
      docker push "$(IMAGE_NAME):$(DOCKER_TAG)"
    displayName: Push Docker image
    condition: and(succeeded(), or(eq(variables['Build.SourceBranchName'], 'master'), eq(variables['Build.SourceBranchName'], 'beta')))
