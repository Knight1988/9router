trigger:
  branches:
    include:
      - latest
      - beta

pool:
  name: Ubuntu

variables:
  IMAGE_NAME: knight1988/9router
  DOCKER_TAG: $(Build.SourceBranchName)

stages:
  - stage: Test
    displayName: Build and Test
    jobs:
      - job: UnitTests
        displayName: Run Unit Tests
        pool:
          name: Ubuntu
        steps:
          - checkout: self
            displayName: Checkout source

          - script: |
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              export PATH="$(dirname "$(nvm which current 2>/dev/null || command -v node)"):$PATH"
              echo "Using node: $(which node) ($(node -v))"
              echo "Using npm:  $(which npm) ($(npm -v))"
              npm install
              cd tests
              npm install
              npm test
            displayName: Run Vitest unit tests

      - job: Test
        displayName: Build Docker and Run Tests
        dependsOn: UnitTests
        pool:
          name: Ubuntu
        steps:
          - checkout: self
            displayName: Checkout source

          - script: |
              docker compose down
              docker compose up --build -d

              echo "Waiting for server to be ready..."
              for i in $(seq 1 30); do
                if curl -sk https://localhost:20129/v1/models > /dev/null 2>&1; then
                  echo "Server ready."
                  break
                fi
                sleep 2
              done

              PASS=0
              FAIL=0

              run_test() {
                local label="$1"
                local response="$2"

                echo "=== $label ==="
                echo "$response"

                # Try SSE streaming format first (content_block_delta events)
                content=$(echo "$response" | grep "content_block_delta" | grep -oE '"text"[[:space:]]*:[[:space:]]*"[^"]*"' | sed -E 's/"text"[[:space:]]*:[[:space:]]*"//g' | sed 's/"//g' | tr -d '\n')
                # Fall back to non-streaming JSON response format
                if [ -z "$content" ]; then
                  content=$(echo "$response" | grep -oE '"text"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 | sed -E 's/"text"[[:space:]]*:[[:space:]]*"//g' | sed 's/"//g')
                fi

                if [ -n "$content" ]; then
                  echo "PASS: $content"
                  PASS=$((PASS+1))
                else
                  echo "FAIL: no content found"
                  FAIL=$((FAIL+1))
                fi
                echo
              }

              FIRST=1
              for model in planning coding; do
                if [ "$FIRST" = "0" ]; then
                  echo "Waiting 5s for model locks to expire..."
                  sleep 5
                fi
                FIRST=0

                run_test "$model" "$(curl -sk https://localhost:20129/v1/messages \
                  -H "Content-Type: application/json" \
                  -H "x-api-key: $(TEST_API_KEY)" \
                  -H "anthropic-version: 2023-06-01" \
                  -d "{\"model\":\"$model\",\"messages\":[{\"role\":\"user\",\"content\":\"say hi\"}],\"max_tokens\":50}" 2>&1)"
              done

              echo "Results: $PASS passed, $FAIL failed"

              docker compose down

              if [ "$FAIL" -gt 0 ]; then
                exit 1
              fi
            displayName: Run tests

  - stage: Build
    displayName: Build and Push Docker Image
    dependsOn: Test
    condition: and(succeeded(), or(eq(variables['Build.SourceBranchName'], 'latest'), eq(variables['Build.SourceBranchName'], 'beta')))
    jobs:
      - job: Build
        displayName: Build and Push
        pool:
          name: Ubuntu
        steps:
          - checkout: self
            displayName: Checkout source

          - script: |
              echo "Building Docker image $(IMAGE_NAME):$(DOCKER_TAG)..."
              docker build -t "$(IMAGE_NAME):$(DOCKER_TAG)" .
            displayName: Build Docker image

          - script: |
              echo "Pushing Docker image $(IMAGE_NAME):$(DOCKER_TAG)..."
              docker push "$(IMAGE_NAME):$(DOCKER_TAG)"
            displayName: Push Docker image

  - stage: Deploy
    displayName: Redeploy Dockge
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'beta'))
    jobs:
      - job: Deploy
        displayName: Redeploy via Dockge
        pool:
          name: Ubuntu
        steps:
          - script: |
              set -euo pipefail
              DOCKGE_URL="https://dk-server.linkpc.net/dockge"
              STACK_NAME=9router
              MAX_RETRIES=3
              RETRY_DELAY=10

              echo "Triggering Dockge update (pull + redeploy) for stack ${STACK_NAME}..."
              for i in $(seq 1 $MAX_RETRIES); do
                echo "Attempt $i of $MAX_RETRIES..."
                RESPONSE=$(curl -sS -X POST --max-time 120 \
                  -H "Authorization: Bearer $(DOCKGE_API_TOKEN)" \
                  "${DOCKGE_URL}/api/stacks/${STACK_NAME}/update" 2>&1)
                if echo "$RESPONSE" | grep -q '"ok":[[:space:]]*true'; then
                  echo "$RESPONSE"
                  echo "Dockge redeploy successful."
                  exit 0
                fi
                echo "Attempt $i failed: $RESPONSE"
                if [ $i -lt $MAX_RETRIES ]; then
                  echo "Waiting ${RETRY_DELAY}s before retry..."
                  sleep $RETRY_DELAY
                fi
              done
              echo "All retry attempts failed."
              exit 1
            displayName: Redeploy 9router stack via Dockge
            env:
              DOCKGE_API_TOKEN: $(DOCKGE_API_TOKEN)
